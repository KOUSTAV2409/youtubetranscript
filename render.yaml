# WorthWatch API on Render (Docker — reliable for yt-dlp + FastAPI)
# Dashboard: New → Blueprint → this repo, branch `koustav`
# Set OPENAI_API_KEY in the dashboard after create.

services:
  - type: web
    name: worthwatch-backend
    runtime: docker
    plan: free
    branch: koustav
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_PATH
        value: /app/data/cache.db
      # YouTube blocks Render IPs — set these after buying Webshare Residential
      - key: WEBSHARE_PROXY_USERNAME
        sync: false
      - key: WEBSHARE_PROXY_PASSWORD
        sync: false
