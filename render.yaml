# WorthWatch API — deploy with Render Blueprint
# Dashboard: New → Blueprint → select this repo
# After Vercel deploy, set CORS_ORIGINS to your real frontend URL.

services:
  - type: web
    name: worthwatch-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_PATH
        value: data/cache.db
